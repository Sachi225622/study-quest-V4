<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Study Quest</title>
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./apple-touch-icon.png">
<meta name="theme-color" content="#ff7ab6">
<style>
:root{--pink:#ff7ab6;--purple:#8b5cf6;--mint:#9ff5cf;--yellow:#ffe68a;--ink:#40354f;--red:#ff6b6b}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:linear-gradient(135deg,#ffe0ef 0%,#dff6ff 45%,#fff2a8 100%);min-height:100vh}
.app{max-width:520px;margin:0 auto;padding:18px 14px 80px}
.hero,.card{background:rgba(255,255,255,.94);border-radius:28px;padding:18px;box-shadow:0 14px 35px rgba(110,80,160,.16);border:3px solid rgba(255,255,255,.72);margin-bottom:16px}
.title{font-size:30px;font-weight:900;margin:0;text-align:center;color:var(--purple)}
.subtitle{text-align:center;margin:6px 0 14px;font-weight:700;color:#785e90}
.tabs,.mode-tabs{display:flex;gap:9px;margin:12px 0;flex-wrap:wrap}
.tab,.mode{flex:1;border:0;border-radius:999px;padding:12px 10px;font-weight:900;font-size:15px;background:#fff;color:var(--ink);box-shadow:0 5px 10px rgba(0,0,0,.08);min-width:120px}
.tab.active,.mode.active{background:var(--purple);color:#fff}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.stat{background:#fff;border-radius:18px;padding:12px;text-align:center}
.big{font-size:25px;font-weight:900;color:var(--pink)}
.label{font-size:12px;font-weight:800;color:#766985}
h2{margin:0 0 14px;font-size:22px}
.task{background:#fff;border:2px solid #f4e8ff;border-radius:24px;padding:18px;margin:30px 0;box-shadow:0 10px 24px rgba(110,80,160,.12)}
.task-head{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;margin-bottom:8px}
.subject{font-weight:900;color:var(--purple);display:inline-block;background:#f5edff;border-radius:999px;padding:5px 10px;margin-bottom:8px;font-size:14px}
.task-title{font-size:20px;font-weight:900;line-height:1.25;margin-bottom:4px}
.badge{font-size:12px;font-weight:900;border-radius:999px;padding:6px 9px;white-space:nowrap}
.approved{background:#d7ffe8;color:#1f5e3a}.pending{background:#ffe0e6;color:#8a1f3c}
.due{display:inline-block;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}
.due-red{background:#ffe0e0;color:#b42323}.due-orange{background:#fff1d6;color:#a15c00}.due-green{background:#ddffe7;color:#176744}.due-gray{background:#eee;color:#666}
.meta-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0 4px}
.progress{height:10px;background:#eee5f6;border-radius:999px;overflow:hidden;margin:12px 0 6px}
.bar{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));width:0%}
.progress-text{font-size:14px;font-weight:800;color:#766985;margin-top:4px}
.pages{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px;margin-bottom:8px}
.page{border:0;border-radius:14px;padding:8px 11px;background:#f0edf8;font-weight:900;color:#6d5c82}
.page.done{background:var(--mint);color:#176744}
.main-complete-btn{width:100%;min-height:46px;border:0;border-radius:18px;padding:10px 14px;margin-top:14px;font-size:15px;font-weight:900;background:linear-gradient(135deg,#58c77a,#9ff5cf);color:#164d2c;box-shadow:0 8px 18px rgba(88,199,122,.22)}
.sub-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;padding-top:10px;border-top:1px dashed #eadcff}
button.primary,button.secondary,button.danger{border:0;border-radius:16px;padding:12px;font-weight:900;font-size:15px;margin-top:8px}
button.primary{background:var(--pink);color:#fff}button.secondary{background:#fff;color:var(--purple);border:2px solid #eadcff}button.danger{background:var(--red);color:#fff}
input,select{width:100%;border:2px solid #eee1ff;border-radius:14px;padding:12px;margin:6px 0 10px;font-size:16px;background:#fff}
.hidden{display:none}
.segmented{display:flex;gap:8px;margin:6px 0 10px}
.segmented button{flex:1;border:2px solid #eadcff;background:white;color:var(--purple);border-radius:16px;padding:12px;font-weight:900}
.segmented button.active{background:var(--purple);color:white}
.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#332947;color:#fff;padding:12px 18px;border-radius:999px;font-weight:900;display:none;z-index:20}
.modal{position:fixed;inset:0;background:rgba(30,20,45,.45);display:none;align-items:center;justify-content:center;padding:14px;z-index:50}
.modal-content{background:white;border-radius:24px;max-width:500px;width:100%;padding:18px;max-height:90vh;overflow:auto;box-shadow:0 20px 50px rgba(0,0,0,.25)}
.notice{background:#fff4f8;border:2px solid #ffd6e7;border-radius:18px;padding:12px;margin:10px 0;font-weight:800}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <h1 class="title">✨ Study Quest ✨</h1>
    <p class="subtitle">毎日の課題を見える化</p>
    <div class="mode-tabs">
      <button class="mode active" onclick="setMode('child')">📱 子ども</button>
      <button class="mode" onclick="setMode('parent')">👩 親管理</button>
      <button class="mode" onclick="setMode('dashboard')">📊 ダッシュボード</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setKid('SUMILE')">🎀 SUMILE</button>
      <button class="tab" onclick="setKid('SHIANA')">🌟 SHIANA</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="big" id="point">0pt</div><div class="label">Available Points</div></div>
      <div class="stat"><div class="big" id="cash">0円</div><div class="label">Reward Balance</div></div>
    </div>
  </div>

  <section id="childView">
    <div class="card">
      <h2>🎯 Today / 今日やる課題</h2>
      <div id="todayFocus"></div>
    </div>

    <div class="card">
      <h2>➕ Add Task / 課題を追加</h2>
      <div class="segmented">
        <button id="pageTypeBtn" class="active" onclick="setTaskType('page')">ページ型</button>
        <button id="singleTypeBtn" onclick="setTaskType('single')">一括型</button>
      </div>
      <select id="subject"><option>数学</option><option>英語</option><option>国語</option><option>理科</option><option>社会</option><option>探究</option><option>その他</option></select>
      <input id="taskTitle" placeholder="例：数学ワーク / 探究学習" />
      <div id="pageFields">
        <input id="startPage" type="number" placeholder="開始ページ / Step番号" />
        <input id="endPage" type="number" placeholder="終了ページ / Step番号" />
        <input id="pointPerPage" type="number" value="1" step="0.5" placeholder="1ページあたりポイント" />
      </div>
      <div id="singleFields" class="hidden">
        <input id="singlePoint" type="number" value="3" step="0.5" placeholder="達成ポイント 例：3" />
      </div>
      <label><small>提出期限</small></label>
      <input id="dueDate" type="date" />
      <button class="primary" onclick="addTask()">課題を追加</button>
    </div>

    <div class="card">
      <h2>📚 Active Tasks / 未完了の課題</h2>
      <div id="tasks"></div>
    </div>

    <div class="card">
      <h2>💰 換金申請</h2>
      <input id="rewardPoint" type="number" placeholder="換金するポイント 例：10" />
      <input id="rewardMemo" placeholder="例：現金に交換" />
      <button class="primary" onclick="requestReward()">換金申請</button>
    </div>
  </section>

  <section id="parentView" class="hidden">
    <div class="card"><h2>✅ 承認待ち課題</h2><div id="pendingTasks"></div></div>
    <div class="card"><h2>💰 承認待ち換金申請</h2><div id="pendingRewards"></div></div>
  </section>

  <section id="dashboardView" class="hidden">
    <div class="card"><h2>📊 ダッシュボード</h2><div id="dashboard"></div></div>
  </section>
</div>

<div class="modal" id="editModal">
  <div class="modal-content">
    <h2>✏️ 課題編集</h2>
    <input type="hidden" id="editTaskId" />
    <select id="editSubject"><option>数学</option><option>英語</option><option>国語</option><option>理科</option><option>社会</option><option>探究</option><option>その他</option></select>
    <input id="editTitle" placeholder="課題名" />
    <input id="editStart" type="number" placeholder="開始ページ" />
    <input id="editEnd" type="number" placeholder="終了ページ" />
    <input id="editPoint" type="number" step="0.5" placeholder="ポイント" />
    <label><small>提出期限</small></label>
    <input id="editDueDate" type="date" />
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
      <button class="primary" onclick="saveEditTask()">保存</button>
      <button class="secondary" onclick="closeEditModal()">キャンセル</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyRtB_hjEs8vsLM6a3mglcClql7GlGqcdC05G7vUKDMhK6yWnNTdP--RkaZJgKu_HZo/exec";
const YEN_PER_POINT = 100;
let currentKid = "SUMILE";
let currentMode = "child";
let taskType = "page";
let data = {tasks:[], rewards:[]};

function save(){ localStorage.setItem("studyQuestV31", JSON.stringify(data)); }
function toast(msg){ const t=document.getElementById("toast"); t.textContent=msg; t.style.display="block"; setTimeout(()=>t.style.display="none",1800); }

function setMode(m){
 currentMode=m;
 document.querySelectorAll(".mode").forEach(b=>b.classList.remove("active"));
 [...document.querySelectorAll(".mode")].find(b=>b.textContent.includes(m==="child"?"子ども":m==="parent"?"親管理":"ダッシュボード")).classList.add("active");
 render();
}
function setKid(k){
 currentKid=k;
 document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));
 [...document.querySelectorAll(".tab")].find(b=>b.textContent.includes(k)).classList.add("active");
 render();
}
function setTaskType(t){
 taskType=t;
 document.getElementById("pageTypeBtn").classList.toggle("active",t==="page");
 document.getElementById("singleTypeBtn").classList.toggle("active",t==="single");
 document.getElementById("pageFields").classList.toggle("hidden",t!=="page");
 document.getElementById("singleFields").classList.toggle("hidden",t!=="single");
}

function pagesOf(t){
 if(t.type==="single") return [1];
 const start=Number(t.start||1), end=Number(t.end||start);
 const arr=[];
 for(let i=start;i<=end;i++) arr.push(i);
 return arr.length ? arr : [1];
}
function isCompleted(t){ return t.manualComplete===true || taskProgress(t)>=100; }
function taskProgress(t){ const pages=pagesOf(t); return pages.length ? Math.round((t.done||[]).length/pages.length*100) : 0; }
function approvedPoint(kid){ return data.tasks.filter(t=>t.kid===kid && t.approved).reduce((s,t)=>s+(t.done||[]).length*Number(t.point||1),0); }
function redeemedPoint(kid){ return data.rewards.filter(r=>r.kid===kid && r.approved).reduce((s,r)=>s+Number(r.point||0),0); }
function daysLeft(due){
 if(!due) return null;
 const today=new Date(); today.setHours(0,0,0,0);
 const d=new Date(due); d.setHours(0,0,0,0);
 return Math.round((d-today)/(1000*60*60*24));
}
function dueLabel(t){
 const n=daysLeft(t.dueDate);
 if(n===null || isNaN(n)) return '<span class="due due-gray">期限なし</span>';
 const cls=n<=3?'due-red':n<=7?'due-orange':'due-green';
 const txt=n<0?`期限 ${Math.abs(n)}日超過`:n===0?'今日が期限':`あと${n}日`;
 return `<span class="due ${cls}">📅 ${t.dueDate} / ${txt}</span>`;
}

async function loadFromSheet(){
 try{
   const res = await fetch(API_URL + "?action=getData&ts=" + Date.now());
   const json = await res.json();
   data.tasks = (json.tasks || []).map(t=>({
     id:String(t.id||""),
     kid:String(t.kid||"").toUpperCase(),
     type:t.type || "page",
     subject:t.subject || "その他",
     title:t.title || "",
     start:Number(t.start||1),
     end:Number(t.end||1),
     point:Number(t.point||1),
     dueDate:t.dueDate || "",
     approved:String(t.approved).toLowerCase()==="true" || t.approved===true,
     manualComplete:String(t.manualComplete).toLowerCase()==="true" || t.manualComplete===true,
     completedAt:t.completedAt || "",
     done:Array.isArray(t.done)?t.done.map(Number):[]
   })).filter(t=>t.id && t.kid && t.title);
   data.rewards = (json.rewards || []).map(r=>({
     id:String(r.id||""),
     kid:String(r.kid||"").toUpperCase(),
     point:Number(r.point||0),
     memo:r.memo||"",
     approved:String(r.approved).toLowerCase()==="true" || r.approved===true,
     date:r.date||""
   }));
   save();
   render();
 }catch(e){
   const cached=localStorage.getItem("studyQuestV31");
   if(cached){ data=JSON.parse(cached); render(); toast("保存データを表示"); }
   else{ render(); toast("読み込みできませんでした"); }
 }
}

function render(){
 document.getElementById("childView").classList.toggle("hidden",currentMode!=="child");
 document.getElementById("parentView").classList.toggle("hidden",currentMode!=="parent");
 document.getElementById("dashboardView").classList.toggle("hidden",currentMode!=="dashboard");
 const available=approvedPoint(currentKid)-redeemedPoint(currentKid);
 document.getElementById("point").textContent=available+"pt";
 document.getElementById("cash").textContent=(available*YEN_PER_POINT).toLocaleString()+"円";
 renderTodayFocus();
 renderTasks();
 renderParent();
 renderDashboard();
}

function renderTodayFocus(){
 const box=document.getElementById("todayFocus");
 const tasks=data.tasks.filter(t=>t.kid===currentKid && !isCompleted(t)).sort((a,b)=>(daysLeft(a.dueDate)??9999)-(daysLeft(b.dueDate)??9999)).slice(0,3);
 box.innerHTML = tasks.map(t=>`<div class="notice"><strong>${t.subject}：${t.title}</strong><br>${dueLabel(t)}</div>`).join("") || "<p>今日やる課題はありません。</p>";
}

function renderTasks(){
 const box=document.getElementById("tasks");
 const tasks=data.tasks.filter(t=>t.kid===currentKid && !isCompleted(t)).sort((a,b)=>(daysLeft(a.dueDate)??9999)-(daysLeft(b.dueDate)??9999));
 box.innerHTML = tasks.map(t=>{
   const pages=pagesOf(t), pct=taskProgress(t), typeLabel=t.type==="single"?"一括型":"ページ型";
   return `<div class="task">
     <div class="task-head">
       <div><div class="subject">${t.subject} / ${typeLabel}</div><div class="task-title">${t.title}</div></div>
       <span class="badge ${t.approved?'approved':'pending'}">${t.approved?'✅ 承認済み':'⏳ 親確認待ち'}</span>
     </div>
     <div class="meta-row">${dueLabel(t)}</div>
     <div class="progress"><div class="bar" style="width:${pct}%"></div></div>
     <div class="progress-text">${(t.done||[]).length}/${pages.length} 完了（${pct}%） / ${t.point}pt</div>
     <div class="pages">${pages.map(p=>`<button class="page ${(t.done||[]).includes(p)?'done':''}" onclick="togglePage('${t.id}',${p})">${(t.done||[]).includes(p)?'✓':''}${t.type==="single"?"課題完了":p}</button>`).join("")}</div>
     <button class="main-complete-btn" onclick="completeTask('${t.id}')">🏁 課題完了</button>
     <div class="sub-actions"><button class="secondary" onclick="openEditTask('${t.id}')">✏️ 編集</button><button class="danger" onclick="deleteTask('${t.id}')">🗑️ 削除</button></div>
   </div>`;
 }).join("") || "<p>未完了の課題はありません。</p>";
}

function renderParent(){
 const pending=data.tasks.filter(t=>!t.approved);
 document.getElementById("pendingTasks").innerHTML = pending.map(t=>`<div class="task"><div class="subject">${t.kid} / ${t.subject}</div><div class="task-title">${t.title}</div>${dueLabel(t)}<div class="sub-actions"><button class="secondary" onclick="openEditTask('${t.id}')">✏️ 編集</button><button class="primary" onclick="approveTask('${t.id}')">承認</button></div><button class="danger" onclick="deleteTask('${t.id}')" style="width:100%;">🗑️ 削除</button></div>`).join("") || "<p>承認待ちはありません。</p>";
 const rewards=data.rewards.filter(r=>!r.approved);
 document.getElementById("pendingRewards").innerHTML = rewards.map(r=>`<div class="task"><strong>${r.kid}</strong>：${r.point}pt / ${(r.point*YEN_PER_POINT).toLocaleString()}円<br><button class="primary" onclick="approveReward('${r.id}')">承認</button></div>`).join("") || "<p>承認待ちはありません。</p>";
}

function renderDashboard(){
 const rows=["SUMILE","SHIANA"].map(k=>{
   const active=data.tasks.filter(t=>t.kid===k && !isCompleted(t)).length;
   const available=approvedPoint(k)-redeemedPoint(k);
   return `<div class="notice"><strong>${k}</strong><br>💰 ${available}pt / ${(available*YEN_PER_POINT).toLocaleString()}円<br>📚 Active: ${active}件</div>`;
 }).join("");
 document.getElementById("dashboard").innerHTML=rows;
}

function togglePage(id,page){
 const t=data.tasks.find(x=>x.id===id); if(!t) return;
 t.done=t.done||[];
 if(t.done.includes(page)) t.done=t.done.filter(x=>x!==page); else t.done.push(page);
 save(); render(); sync("togglePage",{id,page,done:t.done.includes(page)});
}
function addTask(){
 const title=document.getElementById("taskTitle").value.trim();
 if(!title){toast("課題名を入力してね"); return;}
 let task;
 if(taskType==="page"){
   const start=Number(document.getElementById("startPage").value), end=Number(document.getElementById("endPage").value);
   if(!start || !end || end<start){toast("ページを確認してね"); return;}
   task={id:"T"+Date.now(),kid:currentKid,type:"page",subject:document.getElementById("subject").value,title,start,end,point:Number(document.getElementById("pointPerPage").value||1),dueDate:document.getElementById("dueDate").value,approved:false,manualComplete:false,done:[]};
 }else{
   task={id:"T"+Date.now(),kid:currentKid,type:"single",subject:document.getElementById("subject").value,title,start:1,end:1,point:Number(document.getElementById("singlePoint").value||3),dueDate:document.getElementById("dueDate").value,approved:false,manualComplete:false,done:[]};
 }
 data.tasks.push(task); save(); render(); sync("addTask",task); toast("課題を追加しました");
}
function completeTask(id){
 const t=data.tasks.find(x=>x.id===id); if(!t) return;
 if(!confirm("この課題を完了にしますか？")) return;
 t.manualComplete=true; t.completedAt=new Date().toISOString().slice(0,10);
 const pages=pagesOf(t); if(!t.done || t.done.length===0) t.done=[...pages];
 save(); render(); sync("completeTask",{id,completedAt:t.completedAt,done:t.done});
}
function deleteTask(id){
 if(!confirm("この課題を削除しますか？")) return;
 data.tasks=data.tasks.filter(t=>t.id!==id); save(); render(); sync("deleteTask",{id});
}
function approveTask(id){ const t=data.tasks.find(x=>x.id===id); if(!t) return; t.approved=true; save(); render(); sync("approveTask",{id}); }
function requestReward(){
 const point=Number(document.getElementById("rewardPoint").value); if(!point){toast("ポイント数を入力してね");return;}
 const r={id:"R"+Date.now(),kid:currentKid,point,memo:document.getElementById("rewardMemo").value.trim()||"現金に交換",approved:false,date:new Date().toISOString()};
 data.rewards.push(r); save(); render(); sync("requestReward",r);
}
function approveReward(id){ const r=data.rewards.find(x=>x.id===id); if(!r) return; r.approved=true; save(); render(); sync("approveReward",{id}); }

function openEditTask(id){
 const t=data.tasks.find(x=>x.id===id); if(!t) return;
 document.getElementById("editTaskId").value=t.id;
 document.getElementById("editSubject").value=t.subject;
 document.getElementById("editTitle").value=t.title;
 document.getElementById("editStart").value=t.start;
 document.getElementById("editEnd").value=t.end;
 document.getElementById("editPoint").value=t.point;
 document.getElementById("editDueDate").value=t.dueDate||"";
 document.getElementById("editModal").style.display="flex";
}
function closeEditModal(){ document.getElementById("editModal").style.display="none"; }
function saveEditTask(){
 const id=document.getElementById("editTaskId").value;
 const t=data.tasks.find(x=>x.id===id); if(!t) return;
 t.subject=document.getElementById("editSubject").value;
 t.title=document.getElementById("editTitle").value.trim()||t.title;
 t.start=Number(document.getElementById("editStart").value||1);
 t.end=Number(document.getElementById("editEnd").value||1);
 t.point=Number(document.getElementById("editPoint").value||1);
 t.dueDate=document.getElementById("editDueDate").value;
 t.done=(t.done||[]).filter(p=>p>=t.start && p<=t.end);
 save(); render(); closeEditModal(); sync("editTask",t);
}

async function sync(action,payload){
 try{ await fetch(API_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},body:JSON.stringify({action,payload})}); }
 catch(e){ console.log(e); toast("端末内に保存しました"); }
}

loadFromSheet();
</script>
</body>
</html>
