<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Study Quest Family v14</title>
<style>
:root{--pink:#ff7ab6;--purple:#8b5cf6;--mint:#9ff5cf;--yellow:#ffe68a;--ink:#40354f;--red:#ff6b6b;--orange:#ffad4f;--green:#58c77a}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:var(--ink);background:linear-gradient(135deg,#ffe0ef 0%,#dff6ff 45%,#fff2a8 100%);min-height:100vh}
.app{max-width:520px;margin:0 auto;padding:18px 14px 96px}
.hero,.card{background:rgba(255,255,255,.92);border-radius:28px;padding:18px;box-shadow:0 14px 35px rgba(110,80,160,.16);border:3px solid rgba(255,255,255,.72);margin-bottom:14px}
.title{font-size:30px;font-weight:900;margin:0;text-align:center;color:var(--purple)}
.subtitle{text-align:center;margin:6px 0 14px;font-weight:700;color:#785e90}
.tabs,.mode-tabs{display:flex;gap:9px;margin:12px 0;flex-wrap:wrap}
.tab,.mode{flex:1;border:0;border-radius:999px;padding:12px 10px;font-weight:900;font-size:15px;background:#fff;color:var(--ink);box-shadow:0 5px 10px rgba(0,0,0,.08);min-width:120px}
.tab.active,.mode.active{background:var(--purple);color:#fff}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.stat{background:#fff;border-radius:18px;padding:12px;text-align:center}
.big{font-size:25px;font-weight:900;color:var(--pink)}
.label{font-size:12px;font-weight:800;color:#766985}
.card h2{margin:0 0 10px;font-size:19px}
.quest{background:#fff;border:2px solid #f4e8ff;border-radius:20px;padding:14px;margin:10px 0}
.quest-head{display:flex;justify-content:space-between;gap:8px;align-items:center}
.subject{font-weight:900;color:var(--purple)}
.badge{font-size:12px;font-weight:900;border-radius:999px;padding:6px 9px;background:var(--yellow);white-space:nowrap}
.pending{background:#ffe0e6}.approved{background:#d7ffe8}
.due{display:inline-block;margin-top:8px;border-radius:999px;padding:6px 10px;font-size:12px;font-weight:900}
.due-red{background:#ffe0e0;color:#b42323}.due-orange{background:#fff1d6;color:#a15c00}.due-green{background:#ddffe7;color:#176744}.due-gray{background:#eee;color:#666}
.pages{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.page{border:0;border-radius:14px;padding:9px 11px;background:#f0edf8;font-weight:900;color:#6d5c82}
.page.done{background:var(--mint);color:#176744}
.progress{height:12px;background:#eee5f6;border-radius:999px;overflow:hidden;margin:12px 0 4px}
.bar{height:100%;background:linear-gradient(90deg,var(--pink),var(--purple));width:0%}
button.primary,button.secondary{border:0;border-radius:16px;padding:12px 12px;font-weight:900;font-size:15px;margin-top:8px}
button.primary{background:var(--pink);color:#fff} button.secondary{background:#fff;color:var(--purple);border:2px solid #eadcff}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
input,select{width:100%;border:2px solid #eee1ff;border-radius:14px;padding:12px;margin:6px 0 10px;font-size:16px;background:#fff}
small{color:#786f83}.toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#332947;color:#fff;padding:12px 18px;border-radius:999px;font-weight:900;display:none;z-index:20}
.hidden{display:none}.dash-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.dash{background:#fff;border-radius:20px;padding:14px}.emoji{font-size:30px}.notice{background:#fff4f8;border:2px solid #ffd6e7;border-radius:18px;padding:12px;margin:10px 0;font-weight:800}
.reward{background:#fff;border:2px solid #ffe1a7;border-radius:18px;padding:12px;margin:10px 0}
.segmented{display:flex;gap:8px;margin:6px 0 10px}
.segmented button{flex:1;border:2px solid #eadcff;background:white;color:var(--purple);border-radius:16px;padding:12px;font-weight:900}
.segmented button.active{background:var(--purple);color:white}
.subject-row{display:flex;justify-content:space-between;border-bottom:1px dashed #eadcff;padding:8px 0;font-weight:800}
</style>
</head>
<body>
<div class="app">
  <div class="hero">
    <h1 class="title">✨ Study Quest Points ✨</h1>
    <p class="subtitle">ページ型も、一括提出も、ポイントに！</p>
    <div class="mode-tabs">
      <button class="mode active" onclick="setMode('child')">📱 子ども</button>
      <button class="mode" onclick="setMode('parent')">👩 親管理</button>
      <button class="mode" onclick="setMode('dashboard')">📊 ダッシュボード</button>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="setKid('SHIANA')">🌟 SHIANA</button>
      <button class="tab" onclick="setKid('SUMILE')">🎀 SUMILE</button>
    </div>
    <div class="stats">
      <div class="stat"><div class="big" id="point">0pt</div><div class="label">未換金ポイント</div></div>
      <div class="stat"><div class="big" id="cash">0円</div><div class="label">換金可能額</div></div>
    </div>
  </div>

  <section id="childView">
    <div class="card">
      <h2>📚 今日のクエスト</h2>
      <button class="secondary" onclick="loadFromSheet()">スプレッドシートから再読込</button>
      <div id="quests"></div>
    </div>
    <div class="card">
      <h2>➕ 課題を追加</h2>
      <div class="segmented">
        <button id="pageTypeBtn" class="active" onclick="setTaskType('page')">ページ型</button>
        <button id="singleTypeBtn" onclick="setTaskType('single')">一括型</button>
      </div>
      <select id="subject"><option>数学</option><option>英語</option><option>国語</option><option>理科</option><option>社会</option><option>探究</option><option>その他</option></select>
      <input id="taskTitle" placeholder="例：数学ワーク / 探究学習提出" />
      <div id="pageFields">
        <input id="startPage" type="number" placeholder="開始ページ / Step番号" />
        <input id="endPage" type="number" placeholder="終了ページ / Step番号" />
        <input id="pointPerPage" type="number" value="1" step="0.5" placeholder="1ページあたりポイント" />
      </div>
      <div id="singleFields" class="hidden">
        <input id="singlePoint" type="number" value="3" step="0.5" placeholder="達成ポイント 例：3" />
      </div>
      <label><small>提出期限</small></label>
      <input id="dueDate" type="date" />
      <button class="primary" onclick="addTask()">クエスト追加</button>
      <small>ページ型＝ページごとにチェック。一括型＝提出完了でまとめてポイント。</small>
    </div>
    <div class="card">
      <h2>💰 換金申請</h2>
      <input id="rewardPoint" type="number" placeholder="換金するポイント 例：10" />
      <input id="rewardMemo" placeholder="例：現金に交換" />
      <button class="primary" onclick="requestReward()">換金申請</button>
    </div>
  </section>

  <section id="parentView" class="hidden">
    <div class="card"><h2>✅ 承認待ち課題</h2><div id="pendingTasks"></div></div>
    <div class="card"><h2>💰 承認待ち換金申請</h2><div id="pendingRewards"></div></div>
    <div class="card"><h2>🏦 換金履歴</h2><div id="rewardHistory"></div></div>
  </section>

  <section id="dashboardView" class="hidden">
    <div class="card"><h2>📊 ファミリーダッシュボード</h2><div class="dash-grid" id="dashboard"></div></div>
    <div class="card"><h2>📚 教科別ポイント</h2><div id="subjectSummary"></div></div>
    <div class="card"><h2>📅 今週締切</h2><div id="dueSoon"></div></div>
  </section>
</div>
<div class="toast" id="toast"></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbyRtB_hjEs8vsLM6a3mglcClql7GlGqcdC05G7vUKDMhK6yWnNTdP--RkaZJgKu_HZo/exec";
const YEN_PER_POINT = 100;
let currentKid="SHIANA", currentMode="child", taskType="page";
let data={tasks:[],rewards:[]};

function save(){localStorage.setItem("studyQuestDataV13",JSON.stringify(data));}
function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.style.display="block";setTimeout(()=>t.style.display="none",1800)}
function setMode(m){currentMode=m;document.querySelectorAll(".mode").forEach(b=>b.classList.remove("active"));[...document.querySelectorAll(".mode")].find(b=>b.textContent.includes(m==="child"?"子ども":m==="parent"?"親管理":"ダッシュボード")).classList.add("active");render();}
function setKid(k){currentKid=k;document.querySelectorAll(".tab").forEach(b=>b.classList.remove("active"));[...document.querySelectorAll(".tab")].find(b=>b.textContent.includes(k)).classList.add("active");render();}
function setTaskType(t){taskType=t;document.getElementById("pageTypeBtn").classList.toggle("active",t==="page");document.getElementById("singleTypeBtn").classList.toggle("active",t==="single");document.getElementById("pageFields").classList.toggle("hidden",t!=="page");document.getElementById("singleFields").classList.toggle("hidden",t!=="single");}
function pagesOf(t){if(t.type==="single")return [1];let a=[];for(let i=Number(t.start);i<=Number(t.end);i++)a.push(i);return a;}
function approvedPoint(kid){return data.tasks.filter(t=>t.kid===kid&&t.approved).reduce((s,t)=>s+t.done.length*Number(t.point||1),0);}
function pendingPoint(kid){return data.tasks.filter(t=>t.kid===kid&&!t.approved).reduce((s,t)=>s+t.done.length*Number(t.point||1),0);}
function redeemedPoint(kid){return data.rewards.filter(r=>r.kid===kid&&r.approved).reduce((s,r)=>s+Number(r.point||0),0);}
function taskProgress(t){const p=pagesOf(t);return p.length?Math.round(t.done.length/p.length*100):0;}
function daysLeft(due){if(!due)return null;const today=new Date();today.setHours(0,0,0,0);const d=new Date(due);d.setHours(0,0,0,0);return Math.round((d-today)/(1000*60*60*24));}
function dueLabel(t){const n=daysLeft(t.dueDate);if(n===null||isNaN(n))return '<span class="due due-gray">期限なし</span>';let cls=n<=3?'due-red':n<=7?'due-orange':'due-green';let text=n<0?`期限 ${Math.abs(n)}日超過`:n===0?'今日が期限':`あと${n}日`;return `<span class="due ${cls}">📅 ${t.dueDate} / ${text}</span>`;}

async function loadFromSheet(){
  try{
    toast("読み込み中...");
    const res=await fetch(API_URL + "?action=getData&ts=" + Date.now());
    const json=await res.json();
    const incomingTasks=(json.tasks||[]).map(t=>({...t,type:t.type||"page",start:Number(t.start||1),end:Number(t.end||1),point:Number(t.point||1),approved:String(t.approved).toLowerCase()==="true"||t.approved===true,done:t.done||[],dueDate:t.dueDate||""}));
    const incomingRewards=(json.rewards||[]).map(r=>({...r,point:Number(r.point||0),approved:String(r.approved).toLowerCase()==="true"||r.approved===true}));
    if(incomingTasks.length===0 && data.tasks.length>0){
      toast("シートが空のため端末内データを保持");
      render();
      return;
    }
    data.tasks=incomingTasks;
    data.rewards=incomingRewards;
    save();render();toast("読み込み完了");
  }catch(e){
    const cached=localStorage.getItem("studyQuestDataV13");
    if(cached){data=JSON.parse(cached);render();toast("オフライン保存を表示");}
    else{render();toast("読み込みできませんでした");}
  }
}
function render(){
 document.getElementById("childView").classList.toggle("hidden",currentMode!=="child");
 document.getElementById("parentView").classList.toggle("hidden",currentMode!=="parent");
 document.getElementById("dashboardView").classList.toggle("hidden",currentMode!=="dashboard");
 const total=approvedPoint(currentKid), available=total-redeemedPoint(currentKid);
 document.getElementById("point").textContent=available+"pt";
 document.getElementById("cash").textContent=(available*YEN_PER_POINT).toLocaleString()+"円";
 renderQuests(); renderParent(); renderDashboard();
}
function renderQuests(){
 const q=document.getElementById("quests");
 const tasks=data.tasks.filter(t=>t.kid===currentKid).sort((a,b)=>(daysLeft(a.dueDate)??9999)-(daysLeft(b.dueDate)??9999));
 q.innerHTML=tasks.map(t=>{const pages=pagesOf(t),pct=taskProgress(t);const typeLabel=t.type==="single"?"一括型":"ページ型";return `<div class="quest"><div class="quest-head"><div><div class="subject">${t.subject} / ${typeLabel}</div><strong>${t.title}</strong><br>${dueLabel(t)}</div><span class="badge ${t.approved?'approved':'pending'}">${t.approved?'親承認済み':'親確認待ち'}</span></div><div class="progress"><div class="bar" style="width:${pct}%"></div></div><small>${t.done.length}/${pages.length} 完了（${pct}%） ${t.approved?'✨ポイント反映':'⏳仮ポイント'} / ${t.point}pt</small><div class="pages">${pages.map(p=>`<button class="page ${t.done.includes(p)?'done':''}" onclick="togglePage('${t.id}',${p})">${t.done.includes(p)?'✓':''}${t.type==="single"?"提出完了":p}</button>`).join("")}</div></div>`}).join("")||"<p>まだクエストがありません。</p>";
}
function renderParent(){
 const pt=document.getElementById("pendingTasks"), pending=data.tasks.filter(t=>!t.approved);
 pt.innerHTML=pending.map(t=>`<div class="quest"><div class="quest-head"><div><div class="subject">${t.kid} / ${t.subject} / ${t.type==="single"?"一括型":"ページ型"}</div><strong>${t.title}</strong><br>${dueLabel(t)}<br><small>${t.type==="single"?"提出完了":`${t.start}〜${t.end}`} / ${t.point}ポイント</small></div><span class="badge pending">待ち</span></div><div class="actions"><button class="primary" onclick="approveTask('${t.id}')">承認</button><button class="secondary" onclick="rejectTask('${t.id}')">削除</button></div></div>`).join("")||"<p>承認待ちはありません。</p>";
 const pr=document.getElementById("pendingRewards"), rewards=data.rewards.filter(r=>!r.approved);
 pr.innerHTML=rewards.map(r=>`<div class="reward"><strong>${r.kid}</strong>：${r.memo || "現金に交換"}<br><small>${r.point}ポイント / ${(r.point*YEN_PER_POINT).toLocaleString()}円 換金申請</small><div class="actions"><button class="primary" onclick="approveReward('${r.id}')">承認</button><button class="secondary" onclick="rejectReward('${r.id}')">却下</button></div></div>`).join("")||"<p>承認待ちはありません。</p>";
 const hist=document.getElementById("rewardHistory");
 const approved=data.rewards.filter(r=>r.approved).sort((a,b)=>String(b.date||"").localeCompare(String(a.date||"")));
 hist.innerHTML=approved.map(r=>`<div class="reward"><strong>${r.kid}</strong>：${r.point}pt / ${(r.point*YEN_PER_POINT).toLocaleString()}円<br><small>${r.memo||"現金に交換"} ${r.date?(" / "+String(r.date).slice(0,10)):""}</small></div>`).join("")||"<p>換金履歴はまだありません。</p>";
}
function renderDashboard(){
 const d=document.getElementById("dashboard");
 d.innerHTML=["SHIANA","SUMILE"].map(k=>{const total=approvedPoint(k), available=total-redeemedPoint(k), tasks=data.tasks.filter(t=>t.kid===k), incomplete=tasks.filter(t=>taskProgress(t)<100).length, pend=pendingPoint(k), week=tasks.filter(t=>{const n=daysLeft(t.dueDate);return n!==null&&n>=0&&n<=7&&taskProgress(t)<100}).length, redeemed=redeemedPoint(k); return `<div class="dash"><div class="emoji">${k==="SHIANA"?"🌟":"🎀"}</div><h3>${k}</h3><div class="big">${available}pt</div><p>💰 換金可能 ${(available*YEN_PER_POINT).toLocaleString()}円</p><p>🏦 換金済み ${redeemed}pt / ${(redeemed*YEN_PER_POINT).toLocaleString()}円</p><p>📚 未完了 ${incomplete}件</p><p>📅 今週締切 ${week}件</p><p>⏳ 仮ポイント ${pend}pt</p></div>`}).join("");
 const s=document.getElementById("subjectSummary");
 const rows=[];
 ["SHIANA","SUMILE"].forEach(k=>{
   const map={};
   data.tasks.filter(t=>t.kid===k&&t.approved).forEach(t=>{map[t.subject]=(map[t.subject]||0)+t.done.length*Number(t.point||1)});
   Object.keys(map).forEach(sub=>rows.push(`<div class="subject-row"><span>${k} / ${sub}</span><span>${map[sub]}pt</span></div>`));
 });
 s.innerHTML=rows.join("")||"<p>教科別ポイントはまだありません。</p>";
 const due=document.getElementById("dueSoon");
 const list=data.tasks.filter(t=>{const n=daysLeft(t.dueDate);return n!==null&&n<=7&&taskProgress(t)<100}).sort((a,b)=>(daysLeft(a.dueDate)??9999)-(daysLeft(b.dueDate)??9999));
 due.innerHTML=list.map(t=>`<div class="notice">${t.kid}：${t.subject}「${t.title}」<br>${dueLabel(t)}</div>`).join("")||"<p>今週締切の未完了クエストはありません。</p>";
}
function togglePage(id,page){const t=data.tasks.find(x=>x.id===id); if(t.done.includes(page))t.done=t.done.filter(x=>x!==page); else t.done.push(page); save();render();sync("togglePage",{id,page,done:t.done.includes(page)});toast(t.approved?`+${t.point}ポイント！`:"チェックしました");}
function addTask(){
 const title=document.getElementById("taskTitle").value.trim(); if(!title){toast("課題名を入力してね");return;}
 let task;
 if(taskType==="page"){
   const start=Number(document.getElementById("startPage").value),end=Number(document.getElementById("endPage").value);
   if(!start||!end||end<start){toast("ページを確認してね");return;}
   task={id:"T"+Date.now(),kid:currentKid,type:"page",subject:document.getElementById("subject").value,title,start,end,point:Number(document.getElementById("pointPerPage").value||1),dueDate:document.getElementById("dueDate").value,approved:false,done:[]};
 } else {
   task={id:"T"+Date.now(),kid:currentKid,type:"single",subject:document.getElementById("subject").value,title,start:1,end:1,point:Number(document.getElementById("singlePoint").value||3),dueDate:document.getElementById("dueDate").value,approved:false,done:[]};
 }
 data.tasks.push(task);save();render();sync("addTask",task);toast("親確認待ちに追加");
}
function requestReward(){const point=Number(document.getElementById("rewardPoint").value),memo=document.getElementById("rewardMemo").value.trim()||"現金に交換"; if(!point){toast("ポイント数を入力してね");return;} const r={id:"R"+Date.now(),kid:currentKid,point,memo,approved:false,date:new Date().toISOString()}; data.rewards.push(r);save();render();sync("requestReward",r);toast("換金申請しました");}
function approveTask(id){const t=data.tasks.find(x=>x.id===id);t.approved=true;save();render();sync("approveTask",{id});toast("課題を承認しました");}
function rejectTask(id){data.tasks=data.tasks.filter(t=>t.id!==id);save();render();sync("rejectTask",{id});toast("課題を削除しました");}
function approveReward(id){const r=data.rewards.find(x=>x.id===id);r.approved=true;save();render();sync("approveReward",{id});toast("換金を承認しました");}
function rejectReward(id){data.rewards=data.rewards.filter(r=>r.id!==id);save();render();sync("rejectReward",{id});toast("換金申請を却下");}
async function sync(action,payload){
  try{
    await fetch(API_URL,{
      method:"POST",
      mode:"no-cors",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action,payload})
    });
  }catch(e){
    console.log(e);
    toast("端末内に保存しました");
  }
}
loadFromSheet();
</script>
</body>
</html>
